<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="hamburger" id="hamburgerBtn" title="Toggle Menu">
            <span></span><span></span><span></span>
        </button>
        <nav class="sidebar-nav">
            
            <a href="#" class="sidebar-link" id="historyBtn" title="History">
                <span class="sidebar-icon">⚙️</span>
                <span class="sidebar-label">History</span>
            </a>

            <!-- Shows when NOT logged in -->
            <a href="/login.html" class="sidebar-link" id="loginLink" title="Sign Up / Login">
                <span class="sidebar-icon">👤</span>
                <span class="sidebar-label">Sign Up / Login</span>
            </a>

            <!-- Shows when logged in -->
            <div class="sidebar-user" id="userSection" style="display:none;">
                <div class="sidebar-link user-info-link" title="Logged in user">
                    <span class="sidebar-icon">🟢</span>
                    <span class="sidebar-label" id="sidebarUsername">User</span>
                </div>
                <button class="sidebar-link logout-btn" id="logoutBtn" title="Logout">
                    <span class="sidebar-icon">🚪</span>
                    <span class="sidebar-label">Logout</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Main wrapper -->
    <div class="page-wrapper" id="pageWrapper">
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="robot-icon">🤖</div>
                <a href="/" class="home-link"><h1>AI Study Assistant</h1></a>
            </div>
        </div>

        <div class="main-content">
            <div class="input-section">
                <label class="input-label">Enter a Study Topic:</label>
                <div class="input-wrapper">
                    <input type="text" id="topicInput" placeholder="E.g., Quantum Computing">
                    <button class="generate-btn" id="generateBtn">Generate</button>
                </div>
            </div>

            <div class="content-grid">
                <div class="summary-section">
                    <h2 class="section-title">Summary</h2>
                    <div id="summaryContent">
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p>Enter a topic and click Generate to see the summary</p>
                        </div>
                    </div>
                </div>

                <div class="mcq-section">
                    <h2 class="section-title">Multiple Choice Questions</h2>
                    <div id="mcqContent">
                        <div class="empty-state">
                            <div class="empty-state-icon">❓</div>
                            <p>MCQ questions will appear here</p>
                        </div>
                    </div>
                </div>
            </div>

            <button class="pdf-button" id="pdfBtn" disabled>
                <span>📥</span> Generate PDF
            </button>
        </div>
    </div>

    </div><!-- /.page-wrapper -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/app.js?v=2"></script>
    <script>
        const sidebar    = document.getElementById('sidebar');
        const pageWrapper = document.getElementById('pageWrapper');
        const hamburgerBtn = document.getElementById('hamburgerBtn');

        hamburgerBtn.addEventListener('click', () => {
            sidebar.classList.toggle('expanded');
            pageWrapper.classList.toggle('sidebar-expanded');
        });

        // ── Auth state check ──
        const user = JSON.parse(sessionStorage.getItem('user') || 'null');

        if (user) {
            // Logged in → show username + logout
            document.getElementById('loginLink').style.display  = 'none';
            document.getElementById('userSection').style.display = 'block';
            document.getElementById('sidebarUsername').textContent = user.username || user.email;
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('user');
            window.location.href = '/login.html';
        });
    </script>
</body>
</html>
